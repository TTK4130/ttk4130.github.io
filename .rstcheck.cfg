[rstcheck]
report_level = WARNING

# ── Custom directives ────────────────────────────────────────────────────────
# jupyter-execute  — jupyter-sphinx
# dropdown         — sphinx-design
# tab-set          — sphinx-design (tab panels)
# bibliography     — sphinxcontrib-bibtex
# graphviz         — sphinx.ext.graphviz
# replite          — jupyterlite-sphinx
ignore_directives = jupyter-execute,dropdown,tab-set,bibliography,graphviz,replite

# ── Custom roles ─────────────────────────────────────────────────────────────
# cite, cite:t     — sphinxcontrib-bibtex (cite:t is the natbib-style textual form)
# numref           — Sphinx built-in, unknown to bare docutils
# external:py:*    — intersphinx cross-reference roles with explicit domain
ignore_roles = cite,cite:t,numref,external:py:func,external:py:class,external:py:meth,external:py:obj

# ── Files / paths ────────────────────────────────────────────────────────────
# example_project.rst uses `.. raw:: html :file: _includes/...`. The path is
# correct relative to Sphinx's source root, but rstcheck resolves :file: from
# CWD and gets a wrong absolute path. Ignoring the file is the only option
# since rstcheck has no per-error suppression mechanism.
ignore_path = docs/_build,docs/_includes,docs/project/example_project.rst